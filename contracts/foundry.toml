[profile.default]
src             = "src"
out             = "out"
libs            = ["lib"]
test            = "test"
script          = "script"
solc_version    = "0.8.24"
optimizer       = true
optimizer_runs  = 200
via_ir          = true
verbosity       = 2

[rpc_endpoints]
somnia_testnet = "${SOMNIA_RPC_URL}"
localhost      = "http://127.0.0.1:8545"

[etherscan]
somnia_testnet = { key = "${SOMNIASCAN_API_KEY}", url = "https://shannon-explorer.somnia.network/api" }

[fuzz]
runs = 256
